<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quiz Team-Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>🏆 Das Daily Quiz</h1>
        <hr>
        
        <!-- Hier änderst du jeden Tag deine Frage -->
        <div class="question-box">
            <h3>Heutige Aufgabe:</h3>
            <p id="quiz-question">Wie lautet die Standard-Methode im Icaros-Framework, um ein Event zu triggern?</p>
        </div>

        <div class="form-group">
            <label for="username">Dein Name:</label>
            <input type="text" id="username" placeholder="Vorname Nachname" required>
        </div>

        <div class="form-group">
            <label for="answer">Deine Antwort:</label>
            <input type="text" id="answer" placeholder="Deine Lösung hier..." required>
        </div>

        <button onclick="sendAnswer()">Antwort abgeben</button>
        
        <p id="result-message" class="message"></p>
    </div>

    <script>
        async function sendAnswer() {
            const name = document.getElementById('username').value;
            const answer = document.getElementById('answer').value;
            const msgEle = document.getElementById('result-message');

            if (!name || !answer) {
                msgEle.innerText = "Bitte fülle beide Felder aus!";
                msgEle.className = "message error";
                return;
            }

            msgEle.innerText = "Prüfe Antwort...";
            msgEle.className = "message";

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, answer })
                });

                const data = await response.json();

                if (response.ok) {
                    msgEle.innerText = "🎉 " + data.message;
                    msgEle.className = "message success";
                } else {
                    msgEle.innerText = "❌ " + data.message;
                    msgEle.className = "message error";
                }
            } catch (error) {
                msgEle.innerText = "Fehler bei der Übertragung.";
                msgEle.className = "message error";
            }
        }
    </script>
</body>
</html>
