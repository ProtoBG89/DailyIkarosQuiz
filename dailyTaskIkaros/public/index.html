<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKAROS Daily Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <header class="apple-header">
            <h1>Das Daily Quiz</h1>
            <p class="subtitle">IKAROS Custom Code Challenge</p>
        </header>

        <div id="login-section" class="login-box hidden">
            <div class="lock-icon">🔒</div>
            <h3>Interner IT-Bereich</h3>
            <p>Bitte gib das Team-Passwort ein, um die heutige Challenge freizuschalten:</p>
            <input type="password" id="team-password" placeholder="Passwort eingeben">
            <button class="apple-btn" onclick="savePassword()">Einloggen</button>
            <p id="login-error" class="error-msg"></p>
        </div>

        <div id="quiz-section" class="hidden">
            
            <div class="apple-user-container">
                <span class="apple-label">🏆 Team Highscores (Live)</span>
                <div class="apple-selector" style="background: #f5f5f7; padding: 15px; border-radius: 12px; gap: 20px; justify-content: space-around; margin-top: 6px;">
                    <div style="text-align: center;">
                        <div style="font-size: 22px; font-weight: 700; color: #1d1d1f;" id="score-Farhat">0</div>
                        <div style="font-size: 12px; color: #86868b; font-weight: 600; margin-top: 2px;">Farhat</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 22px; font-weight: 700; color: #1d1d1f;" id="score-Silviu">0</div>
                        <div style="font-size: 12px; color: #86868b; font-weight: 600; margin-top: 2px;">Silviu</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 22px; font-weight: 700; color: #1d1d1f;" id="score-Jannik">0</div>
                        <div style="font-size: 12px; color: #86868b; font-weight: 600; margin-top: 2px;">Jannik</div>
                    </div>
                </div>
            </div>

            <div class="question-box">
                <span class="pill-tag">Heutige Challenge</span>
                <h2 id="quiz-title">⏳ Challenge wird geladen...</h2>
                <div id="quiz-question" class="question-text">Einen Moment...</div>
            </div>

            <div class="apple-user-container">
                <span class="apple-label">Wer bearbeitet das Quiz gerade?</span>
                <div class="apple-selector">
                    <label class="apple-card">
                        <input type="radio" name="colleague" value="Farhat" required>
                        <div class="card-content">
                            <img src="/images/kollege1.png" alt="Farhat" class="avatar-img">
                            <span class="name">Farhat</span>
                        </div>
                    </label>
                    
                    <label class="apple-card">
                        <input type="radio" name="colleague" value="Silviu">
                        <div class="card-content">
                            <img src="/images/kollege2.png" alt="Silviu" class="avatar-img">
                            <span class="name">Silviu</span>
                        </div>
                    </label>
                    
                    <label class="apple-card">
                        <input type="radio" name="colleague" value="Jannik">
                        <div class="card-content">
                            <img src="/images/kollege3.png" alt="Jannik" class="avatar-img">
                            <span class="name">Jannik</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="answer" class="apple-label">Deine Antwort</label>
                <input type="text" id="answer" placeholder="Dein Lösungscode hier...">
            </div>

            <button class="apple-btn" onclick="submitAnswer()">Antwort abgeben</button>
            <p id="result-message"></p>
        </div>
    </div>

    <script>
        let savedPassword = localStorage.getItem('team_quiz_pw') || '';

        async function loadCurrentQuestion() {
            if (!savedPassword) {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('quiz-section').classList.add('hidden');
                return;
            }

            try {
                const response = await fetch('/api/submit', {
                    headers: { 'x-quiz-password': savedPassword }
                });
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('quiz-section').classList.remove('hidden');
                    document.getElementById('quiz-title').innerText = data.title;
                    document.getElementById('quiz-question').innerHTML = data.question;

                    // Live-Scores aus der Vercel KV-Datenbank mappen
                    if (data.scores) {
                        document.getElementById('score-Farhat').innerText = data.scores["Farhat"] || 0;
                        document.getElementById('score-Silviu').innerText = data.scores["Silviu"] || 0;
                        document.getElementById('score-Jannik').innerText = data.scores["Jannik"] || 0;
                    }
                } else {
                    localStorage.removeItem('team_quiz_pw');
                    savedPassword = '';
                    document.getElementById('login-error').innerText = data.message;
                    document.getElementById('login-section').classList.remove('hidden');
                    document.getElementById('quiz-section').classList.add('hidden');
                }
            } catch (error) {
                document.getElementById('quiz-title').innerText = "🛑 Verbindungsfehler";
                document.getElementById('quiz-question').innerText = "Es konnte keine sichere Verbindung zur IKAROS-API hergestellt werden.";
            }
        }

        function savePassword() {
            const inputPw = document.getElementById('team-password').value;
            if(!inputPw.trim()) return;
            savedPassword = inputPw;
            localStorage.setItem('team_quiz_pw', inputPw);
            loadCurrentQuestion();
        }

        async function submitAnswer() {
            const selectedRadio = document.querySelector('input[name="colleague"]:checked');
            const name = selectedRadio ? selectedRadio.value : '';
            const answer = document.getElementById('answer').value;
            const resultMsg = document.getElementById('result-message');

            if (!name) {
                resultMsg.innerText = "Bitte wähle zuerst aus, wer das Quiz bearbeitet.";
                resultMsg.className = "status-msg error";
                return;
            }

            if (!answer.trim()) {
                resultMsg.innerText = "Bitte trage zuerst deine Lösung ein.";
                resultMsg.className = "status-msg error";
                return;
            }

            resultMsg.innerText = "Prüfe Antwort...";
            resultMsg.className = "status-msg processing";

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, answer, password: savedPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    resultMsg.innerText = data.message;
                    resultMsg.className = "status-msg success";
                    document.getElementById('answer').value = ""; // Eingabefeld leeren
                    
                    // Aktualisiert das Leaderboard live nach 1,5 Sekunden
                    setTimeout(loadCurrentQuestion, 1500); 
                } else {
                    resultMsg.innerText = data.message;
                    resultMsg.className = "status-msg error";
                }
            } catch (error) {
                resultMsg.innerText = "Fehler bei der Übertragung der Antwort.";
                resultMsg.className = "status-msg error";
            }
        }

        // Direkt beim Aufruf starten
        loadCurrentQuestion();
    </script>
</body>
</html>
